<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Roblox Web Admin</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0f0f12;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.panel{

width:900px;
background:#1a1a1f;
border-radius:12px;
box-shadow:0 0 30px rgba(0,0,0,0.7);
padding:25px;

}

.header{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;

}

.header h1{
font-size:22px;
}

.section{
margin-top:20px;
}

input{

width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
background:#2b2b31;
color:white;

}

button{

padding:10px 18px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:14px;

}

.kickBtn{
background:#e74c3c;
color:white;
margin-top:10px;
}

.kickBtn:hover{
background:#c0392b;
}

.printBtn{
background:#3498db;
color:white;
margin-top:10px;
}

.printBtn:hover{
background:#2980b9;
}

.editorContainer{

margin-top:25px;

}

.editorHeader{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:8px;

}

.executeBtn{

background:#2ecc71;
color:white;

}

.executeBtn:hover{
background:#27ae60;
}

textarea{

width:100%;
height:300px;
background:#0d0d10;
border:none;
color:#00ff9c;
padding:15px;
font-family:monospace;
font-size:14px;
border-radius:8px;
resize:none;

}

.footer{

margin-top:15px;
font-size:12px;
color:#888;

}

</style>

</head>

<body>

<div class="panel">

<div class="header">
<h1>Roblox Web Admin Panel</h1>
</div>

<div class="section">

<h3>Kick Player</h3>

<input id="player" placeholder="Username">

<button class="kickBtn" onclick="kickPlayer()">Kick Player</button>

</div>

<div class="section">

<h3>Server Print</h3>

<input id="printmsg" placeholder="Message to print">

<button class="printBtn" onclick="sendPrint()">Send Print</button>

</div>

<div class="editorContainer">

<div class="editorHeader">
<h3>Script Executor</h3>

<button class="executeBtn" onclick="executeScript()">Execute</button>

</div>

<textarea id="scriptEditor">

-- Example script
print("Hello from web admin")

</textarea>

</div>

<div class="footer">

Connected to Render backend

</div>

</div>

<script>

const API = "https://adminpanelwebbased.onrender.com/command"

function kickPlayer(){

const player = document.getElementById("player").value

fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
type:"kick",
player:player
})
})

.then(res=>res.json())
.then(data=>{
alert("Kick command sent")
console.log(data)
})

}

function sendPrint(){

const msg = document.getElementById("printmsg").value

fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
type:"print",
message:msg
})
})

.then(res=>res.json())
.then(data=>{
alert("Print command sent")
console.log(data)
})

}

function executeScript(){

const code = document.getElementById("scriptEditor").value

fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
type:"execute",
script:code
})
})

.then(res=>res.json())
.then(data=>{
alert("Script sent to server")
console.log(data)
})

}

</script>

</body>

</html>
