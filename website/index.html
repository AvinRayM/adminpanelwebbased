<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
</head>

<body>

<h1>Kick Player</h1>

<input id="player" placeholder="Username">

<button onclick="kickPlayer()">Kick Player</button>

<script>

function kickPlayer(){

const player = document.getElementById("player").value

fetch("https://adminpanelwebbased.onrender.com/command",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
type:"kick",
player:player
})
})
.then(res => res.json())
.then(data => console.log(data))

}

</script>

</body>
</html>
